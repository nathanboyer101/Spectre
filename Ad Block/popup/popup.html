<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Spectre AdBlocker</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <header>
    <div class="logo">
      <img id="logo-icon" src="../images/icon128.png" alt="Spectre">
      <div>
        <h1>Spectre AdBlocker</h1>
        <p class="subtitle">Remplace les pubs par tes images</p>
      </div>
    </div>
  </header>

  <!-- Upload zone -->
  <section class="upload-section">
    <label class="upload-btn" for="upload">
      <span class="icon">↑</span> Depuis fichier
      <input type="file" id="upload" accept="image/*" multiple hidden>
    </label>
    <div class="url-row">
      <input type="url" id="url-input" placeholder="https://… coller un lien image" autocomplete="off">
      <button id="url-add">Ajouter</button>
    </div>
  </section>

  <!-- Frequency mode toggle -->
  <section class="freq-section">
    <div class="freq-header">
      <span class="freq-label">Fréquence d'apparition</span>
      <div class="freq-toggle">
        <button id="mode-fair"   class="mode-btn active">Équitable</button>
        <button id="mode-custom" class="mode-btn">Personnalisée</button>
      </div>
    </div>
  </section>

  <!-- Gallery -->
  <section class="gallery-section">
    <div class="gallery-header">
      <span class="gallery-count" id="gallery-count">0 image</span>
      <span class="gallery-hint" id="gallery-hint">Clique pour activer / désactiver</span>
    </div>
    <div id="gallery"></div>
    <p class="empty-state" id="empty-state" hidden>
      Aucune image. Ajoute-en une ci-dessus !
    </p>
  </section>

  <script src="popup.js"></script>
</body>
</html>
